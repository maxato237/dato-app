# pubspec.yaml — DATO (Flutter)
# Starter de référence. Ajuster les versions avec `flutter pub upgrade --major-versions`
# après `flutter create`. Voir ARCHITECTURE.md pour le rôle de chaque package.

name: dato
description: Devis professionnels pour artisans — Afrique francophone.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- État & navigation ---
  flutter_riverpod: ^2.5.1 # state management (controllers, providers)
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0 # navigation déclarative + deep links (lien public)

  # --- UI / design system ---
  google_fonts: ^6.2.1 # Sora + Inter
  flutter_svg: ^2.0.10+1 # icônes
  skeletonizer: ^1.4.2 # états de chargement (skeletons)

  # --- Données ---
  isar: ^3.1.0 # base locale offline-first
  isar_flutter_libs: ^3.1.0
  intl: ^0.19.0 # formatage nombres/dates
  freezed_annotation: ^2.4.4 # DTO immuables (API)
  json_annotation: ^4.9.0

  # --- Réseau / backend Flask ---
  dio: ^5.5.0 # client HTTP
  connectivity_plus: ^6.0.3 # détection hors-ligne

  # --- Auth (Supabase) ---
  supabase_flutter: ^2.5.6 # auth téléphone + OTP, storage logo

  # --- PDF / partage / médias ---
  pdf: ^3.11.0 # génération PDF in-app (gabarit A4)
  printing: ^5.13.1 # aperçu + impression + partage PDF
  share_plus: ^9.0.0 # partage WhatsApp et autres
  url_launcher: ^6.3.0 # deep link whatsapp://
  image_picker: ^1.1.2 # upload logo
  image_cropper: ^7.1.0 # recadrage logo

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  isar_generator: ^3.1.0
  golden_toolkit: ^0.15.0 # tests golden (comparaison aux maquettes)
  mocktail: ^1.0.4 # mocks pour tests de repositories

flutter:
  uses-material-design: true
  # generate: true  # active la génération l10n depuis l10n.yaml
  assets:
    - assets/icons/
    # - assets/images/
